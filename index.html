<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fasly</title>
    <style>
        /* =========================================
           全体の基本設定
           ========================================= */
        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f8f9fa; /* 通常ページ部分の背景色（薄いグレー） */
            color: #333;
            /* 以前あった overflow: hidden; はスクロールさせるために削除しました */
        }

        /* =========================================
           トップの波紋エリア（ファーストビュー）
           ========================================= */
        .hero-area {
            position: relative;
            width: 100%;
            height: 100vh; /* 画面の高さいっぱいに広げる */
            background: radial-gradient(circle at center, #72c7ff 0%, #09e6ff 100%);
            overflow: hidden; /* 波紋がエリア外にはみ出ないようにする */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* 波紋エリアの上にのせるテキスト */
        .hero-title {
            position: relative;
            z-index: 100; /* 波紋より上に表示 */
            color: white;
            font-size: 3rem;
            letter-spacing: 0.2em;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            pointer-events: none; /* テキストがマウス操作の邪魔をしないようにする */
            margin: 0;
        }

        .hero-subtitle {
            position: relative;
            z-index: 10;
            color: white;
            margin-top: 10px;
            font-size: 1rem;
            opacity: 0.9;
            pointer-events: none;
        }

        /* =========================================
           波紋のデザイン
           ========================================= */
        .ripple {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 43% 57% 49% 51% / 44% 52% 48% 56%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.8);
            pointer-events: none;
            will-change: transform, opacity;
            animation: ripple-yurayura 2.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
            z-index: 1; /* テキストより奥、背景より手前に配置 */
        }

        .ripple.inner {
            border-radius: 54% 46% 41% 59% / 51% 58% 42% 49%;
            animation-duration: 2s; 
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes ripple-yurayura {
            0% { opacity: 0.7; transform: translate(-50%, -50%) rotate(0deg) scale(0); }
            100% { opacity: 0; transform: translate(-50%, -50%) rotate(90deg) scale(1); }
        }

        /* =========================================
           浮遊ソーシャルボタン（テンプレート）
           ========================================= */
        .social-float-area {
            position: absolute;
            inset: 0;
            z-index: 20;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .social-buttons {
            position: relative;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .social-button-item {
            position: absolute;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
            pointer-events: auto;
            top: 0;
            left: 0;
        }

        .social-action-btn {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.97), rgba(234, 249, 255, 0.85));
            color: #0f3552;
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }


        .social-icon {
            width: 26px;
            height: 26px;
            display: block;
            fill: currentColor;
        }

        .social-icon-stroke {
            width: 26px;
            height: 26px;
            display: block;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.9;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .social-icon-embed {
            width: 100%;
            height: 100%;
            display: block;
        }

        .social-action-btn.leaf-style {
            border-radius: 52% 48% 58% 42% / 44% 56% 44% 56%;
            position: relative;
        }

        .social-action-btn.leaf-style::after {
            content: '';
            position: absolute;
            inset: 7px;
            border-radius: 50%;
            border: 1px solid rgba(15, 53, 82, 0.08);
            pointer-events: none;
        }

        .social-action-btn:hover {
            transform: translateY(-4px) scale(1.06);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22);
        }

        .social-action-btn:active {
            transform: scale(0.93);
        }

        .social-action-btn:focus-visible {
            outline: 3px solid #ffe978;
            outline-offset: 2px;
        }

        /* =========================================
           ポップアップ（テンプレート）
           ========================================= */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 23, 34, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
            z-index: 100;
            padding: 18px;
        }

        .popup-overlay.is-open {
            opacity: 1;
            visibility: visible;
        }

        .popup-card {
            width: min(440px, 100%);
            background: #ffffff;
            border-radius: 14px;
            padding: 22px 22px 18px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
            transform: translateY(10px) scale(0.96);
            transition: transform 0.25s ease;
        }

        .popup-overlay.is-open .popup-card {
            transform: translateY(0) scale(1);
        }

        .popup-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .popup-title {
            margin: 0;
            color: #133b5b;
        }

        .popup-body {
            margin: 0;
            line-height: 1.65;
            color: #264c67;
        }

        .popup-close-btn {
            border: none;
            background: #e9f4fb;
            color: #143e5f;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.25rem;
            cursor: pointer;
        }

        .popup-close-btn:hover {
            background: #d7eaf7;
        }

        @media (max-width: 700px) {
            .social-float-area {
                width: 100%;
                height: 100%;
            }

            .social-button-item {
                width: 50px;
                height: 50px;
            }

            .social-action-btn {
                font-size: 1rem;
            }

            .social-icon,
            .social-icon-stroke {
                width: 22px;
                height: 22px;
            }
        }

        /* =========================================
           通常コンテンツエリア（スクロールして下に出てくる部分）
           ========================================= */
        .content-area {
            max-width: 1000px;
            margin: 0 auto;
            padding: 80px 20px;
            text-align: center;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 50px;
            color: #2c3e50;
        }

        /* カード型レイアウト（いい感じの装飾） */
        .card-container {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap; /* 画面が狭いと折り返す */
        }

        .card {
            background: white;
            flex: 1;
            min-width: 250px;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); /* ふんわりとした影 */
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-10px); /* マウスを乗せると少し浮くエフェクト */
        }

        .card h3 {
            color: #09e6ff; /* 波紋の色に合わせてアクセントカラーに */
            margin-top: 0;
        }

        /* フッター */
        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 30px 20px;
            margin-top: 50px;
        }
    </style>
</head>

    <script>
        // 波紋エフェクトのJavaScript
        const heroArea = document.getElementById('hero');
        let lastX = 0;
        let lastY = 0;
        const distanceThreshold = 60; 

        // 今回は画面全体(document)ではなく、波紋エリア(heroArea)の上でだけ波紋を出すように変更
        heroArea.addEventListener('mousemove', function(e) {
            // スクロール時のズレを防ぐため、e.pageX/e.pageY を使用
            const currentX = e.pageX;
            const currentY = e.pageY;
            
            const diffX = currentX - lastX;
            const diffY = currentY - lastY;
            const distance = Math.sqrt(diffX * diffX + diffY * diffY);

            if (distance < distanceThreshold) {
                return;
            }

            lastX = currentX;
            lastY = currentY;

            createRipple(currentX, currentY, 'ripple');

            setTimeout(() => {
                createRipple(currentX, currentY, 'ripple inner');
            }, 150);
        });

        function createRipple(x, y, className) {
            const ripple = document.createElement('div');
            ripple.className = className;
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            // bodyではなく、heroAreaの中に波紋を作るように変更
            heroArea.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 2500);
        }

        // ソーシャルボタン共通テンプレート制御
        const socialFloatArea = document.querySelector('.social-float-area');
        const leafItems = Array.from(document.querySelectorAll('.social-button-item'));
        const leafMotionState = [];
        let leafAnimationFrame = null;

        function openPopup(selector) {
            const popup = document.querySelector(selector);
            if (!popup) {
                return;
            }
            popup.classList.add('is-open');
            popup.setAttribute('aria-hidden', 'false');
        }

        function closePopup(popupElement) {
            popupElement.classList.remove('is-open');
            popupElement.setAttribute('aria-hidden', 'true');
        }

        function initializeLeafMotion() {
            if (!socialFloatArea || leafItems.length === 0) {
                return;
            }

            const areaRect = heroArea.getBoundingClientRect();
            const buttonSize = 58;
            const maxX = Math.max(areaRect.width - buttonSize, 0);
            const maxY = Math.max(areaRect.height - buttonSize, 0);

            leafItems.forEach(function (item, index) {
                const existing = leafMotionState[index];
                if (existing) {
                    existing.maxX = maxX;
                    existing.maxY = maxY;
                    return;
                }

                const initialX = index === 0 ? areaRect.width * 0.18 : areaRect.width * 0.68;
                const initialY = index === 0 ? areaRect.height * 0.24 : areaRect.height * 0.66;
                const baseSpeedX = index === 0 ? 0.1 : -0.1;
                const baseSpeedY = index === 0 ? 0.1 : -0.1;
                /*const baseSpeedX = index === 0 ? 0.85 : -0.95;
                const baseSpeedY = index === 0 ? 0.55 : -0.68;*/

                leafMotionState[index] = {
                    x: Math.min(Math.max(initialX, 0), maxX),
                    y: Math.min(Math.max(initialY, 0), maxY),
                    vx: baseSpeedX,
                    vy: baseSpeedY,
                    wobble: index === 0 ? 0 : Math.PI / 2,
                    maxX,
                    maxY
                };
                item.style.transform = `translate(${leafMotionState[index].x}px, ${leafMotionState[index].y}px) rotate(0deg)`;
            });
        }

        function animateLeafMotion() {
            if (!socialFloatArea || leafItems.length === 0) {
                return;
            }

            const areaRect = heroArea.getBoundingClientRect();
            const buttonSize = window.innerWidth <= 700 ? 50 : 58;
            const maxX = Math.max(areaRect.width - buttonSize, 0);
            const maxY = Math.max(areaRect.height - buttonSize, 0);
            const time = performance.now() * 0.001;

            leafItems.forEach(function (item, index) {
                const state = leafMotionState[index];
                if (!state) {
                    return;
                }

                if (state.maxX !== maxX || state.maxY !== maxY) {
                    state.maxX = maxX;
                    state.maxY = maxY;
                    state.x = Math.min(Math.max(state.x, 0), maxX);
                    state.y = Math.min(Math.max(state.y, 0), maxY);
                }

                state.x += state.vx;
                state.y += state.vy;

                const sway = Math.sin(time * 0.6 + state.wobble + index) * 0.003;
                state.vx += sway * 0.03;
                state.vy += Math.cos(time * 0.5 + state.wobble + index) * 0.002;

                const bounceKick = 0.8;

                if (state.x <= 0) {
                    state.x = 0;
                    state.vx = Math.max(Math.abs(state.vx), bounceKick);
                } else if (state.x >= maxX) {
                    state.x = maxX;
                    state.vx = -Math.max(Math.abs(state.vx), bounceKick);
                }

                if (state.y <= 0) {
                    state.y = 0;
                    state.vy = Math.max(Math.abs(state.vy), bounceKick);
                } else if (state.y >= maxY) {
                    state.y = maxY;
                    state.vy = -Math.max(Math.abs(state.vy), bounceKick);
                }

                state.vx += Math.sin(time * 0.1 + index * 1.7) *0.002;
                state.vy += Math.cos(time * 0.1 + index * 1.3) * 0.0015;

                const speedLimit = 0.9;
                state.vx = Math.max(Math.min(state.vx, speedLimit), -speedLimit);
                state.vy = Math.max(Math.min(state.vy, speedLimit), -speedLimit);

                const driftAngle = Math.sin(time * 1.2 + index) * 10 + (state.vx >= 0 ? 1 : -1) * 6;
                item.style.transform = `translate(${state.x}px, ${state.y}px) rotate(${driftAngle}deg)`;
            });

            leafAnimationFrame = window.requestAnimationFrame(animateLeafMotion);
        }

        initializeLeafMotion();
        leafAnimationFrame = window.requestAnimationFrame(animateLeafMotion);

        window.addEventListener('resize', function () {
            initializeLeafMotion();
        });

        document.addEventListener('visibilitychange', function () {
            if (document.hidden) {
                if (leafAnimationFrame) {
                    window.cancelAnimationFrame(leafAnimationFrame);
                    leafAnimationFrame = null;
                }
                return;
            }

            if (!leafAnimationFrame) {
                leafAnimationFrame = window.requestAnimationFrame(animateLeafMotion);
            }
        });

        if (socialFloatArea) {
            socialFloatArea.addEventListener('click', function (event) {
                const button = event.target.closest('.social-action-btn');
                if (!button) {
                    return;
                }

                const actionType = button.dataset.type;
                const target = button.dataset.target;

                if (actionType === 'popup' && target) {
                    openPopup(target);
                }

                if (actionType === 'link' && target) {
                    window.open(target, '_blank', 'noopener,noreferrer');
                }
            });

            socialFloatArea.addEventListener('keydown', function (event) {
                if (event.key !== 'Enter' && event.key !== ' ') {
                    return;
                }

                const button = event.target.closest('.social-action-btn');
                if (!button) {
                    return;
                }

                event.preventDefault();
                button.click();
            });
        }

        document.querySelectorAll('.popup-overlay').forEach(function (popup) {
            popup.addEventListener('click', function (event) {
                const clickedClose = event.target.closest('.popup-close-btn');
                if (clickedClose || event.target === popup) {
                    closePopup(popup);
                }
            });
        });

        document.addEventListener('keydown', function (event) {
            if (event.key !== 'Escape') {
                return;
            }

            document.querySelectorAll('.popup-overlay.is-open').forEach(function (popup) {
                closePopup(popup);
            });
        });
    </script>
</body>
</html>
